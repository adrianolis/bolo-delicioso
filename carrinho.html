<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrinho de Compras - Bolo Delicioso</title>
    <link rel="stylesheet" href="carrinho.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="logobolodelicioso.png" alt="Logo Bolo Delicioso" />
        <span>BOLO DELICIOSO</span>
      </div>
      <nav>
        <a href="index.html">Página inicial</a>
        <a href="promoções.html">Promoções</a>
        <a href="mais-vendidos.html">Mais Vendidos</a>
      </nav>
      <div class="header-buttons">
        <a href="login.html" class="login-btn">Entre ou Cadastre-se</a>
        <a href="carrinho.html" class="cart-btn">
          <img src="carrinho-carrinho.webp" alt="Carrinho" />
        </a>
      </div>
    </header>
    <main>
      <table class="cart-table">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Preço</th>
            <th>Quantidade</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td><p>Seu carrinho está vazio.</p></td>
            <td></td>
            <td></td>
            <td></td>
          </tr>
        </tbody>
      </table>
      <div class="actions">
        <button class="continue-btn">Continuar Comprando</button>
        <button class="checkout-btn">Ir para o Pagamento</button>
      </div>
    </main>
    <footer>
      <div class="contact-info">
        <h3>Entre em Contato</h3>
        <p>Telefone: (11) 1234-5678</p>
        <p>Email: contato@bolodelicioso.com</p>
        <div class="social-media">
          <a href="https://instagram.com" target="_blank">
            <img src="instagram.webp" alt="Instagram" />
          </a>
          <a href="https://twitter.com" target="_blank">
            <img src="twitter.webp" alt="Twitter" />
          </a>
          <a href="https://facebook.com" target="_blank">
            <img src="facebook.webp" alt="Facebook" />
          </a>
        </div>
      </div>
      <div class="payment-methods">
        <h3>Métodos de Pagamento</h3>
        <img src="cartao.webp" alt="Cartão" />
        <img src="paypal.webp" alt="PayPal" />
        <img src="recibo.webp" alt="Boleto" />
      </div>
    </footer>
  </body>
</html>
